<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

<style>
  :root{
    --ink:#14335B;
    --ink-70:#3F5C7A;
    --paper:#E9F3FC;
    --paper-2:#D7E9F8;
    --stamp:#2563EB;
    --gold:#38BDF8;
    --sage:#0F9B8E;
    --line:#BEDCF5;
    --white:#FBFEFF;
    --danger:#D6455A;
    --radius:14px;
    --font-display:'Noto Serif TC','Noto Sans TC',serif;
    --font-body:'Noto Sans TC',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  #travel-log-root{
    font-family:var(--font-body);
    background:var(--paper);
    color:var(--ink);
    min-height:100%;
    padding:0 0 60px;
  }
  #travel-log-root .container{
    max-width:760px;
    margin:0 auto;
    padding:0 20px;
  }
  #travel-log-root .app-header{
    background:var(--ink);
    color:var(--paper);
    padding:28px 0 22px;
    margin-bottom:22px;
    position:relative;
    overflow:hidden;
  }
  #travel-log-root .app-header::after{
    content:"";
    position:absolute;
    left:0;right:0;bottom:0;
    height:6px;
    background:repeating-linear-gradient(90deg,var(--gold) 0 10px, transparent 10px 20px);
    opacity:.55;
  }
  #travel-log-root .app-header .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 6px;
  }
  #travel-log-root .app-header h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:30px;
    margin:0;
    letter-spacing:.01em;
  }
  #travel-log-root .app-header p{
    margin:6px 0 0;
    font-size:13.5px;
    color:#C9E3F7;
  }
  #travel-log-root .header-actions{
    display:flex;gap:10px;justify-content:flex-end;margin-bottom:16px;flex-wrap:wrap;
  }

  /* ---------- top level nav ---------- */
  #travel-log-root .toplevel-nav{
    display:flex;gap:4px;border-bottom:1.5px solid var(--line);margin-bottom:20px;overflow-x:auto;
  }
  #travel-log-root .toplevel-nav button{
    background:none;padding:10px 14px;font-size:13.5px;font-weight:700;color:var(--ink-70);
    border-bottom:2.5px solid transparent;white-space:nowrap;
  }
  #travel-log-root .toplevel-nav button.active{color:var(--ink);border-color:var(--stamp);}

  /* ---------- buttons ---------- */
  #travel-log-root button{font-family:var(--font-body);cursor:pointer;border:none;}
  #travel-log-root .btn{
    display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:999px;
    font-size:14px;font-weight:700;background:var(--ink);color:var(--paper);
    transition:transform .12s ease, opacity .12s ease;
  }
  #travel-log-root .btn:hover{opacity:.88;}
  #travel-log-root .btn:active{transform:scale(.97);}
  #travel-log-root .btn.gold{background:var(--gold);color:var(--ink);}
  #travel-log-root .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink);}
  #travel-log-root .btn.sm{padding:6px 12px;font-size:12.5px;}
  #travel-log-root .btn.block{width:100%;justify-content:center;}
  #travel-log-root .icon-btn{background:transparent;color:var(--ink-70);font-size:16px;padding:4px 8px;border-radius:8px;}
  #travel-log-root .icon-btn:hover{background:var(--paper-2);}
  #travel-log-root .icon-btn.danger:hover{background:#FBE1E6;color:var(--danger);}

  /* ---------- photo trip cards ---------- */
  #travel-log-root .trip-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
  @media (max-width:600px){
    #travel-log-root .trip-grid{grid-template-columns:1fr;}
  }
  #travel-log-root .photo-card{
    position:relative;
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    border:1px solid var(--line);
    box-shadow:0 1px 2px rgba(20,51,91,.06);
    transition:box-shadow .15s ease, transform .15s ease;
    background:var(--white);
  }
  #travel-log-root .photo-card:hover{box-shadow:0 10px 24px rgba(20,51,91,.18);transform:translateY(-1px);}
  #travel-log-root .photo-card-img{
    width:100%;aspect-ratio:16/9;background-size:cover;background-position:center;position:relative;
  }
  #travel-log-root .photo-card-img.placeholder.domestic{
    background:linear-gradient(135deg,#0F9B8E,#5FCBC5);
  }
  #travel-log-root .photo-card-img.placeholder.intl{
    background:linear-gradient(135deg,#14335B,#3D6EA8);
  }
  #travel-log-root .photo-card-img.placeholder::before{
    content:attr(data-icon);
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:52px;opacity:.5;
  }
  #travel-log-root .photo-card-hole{
    position:absolute;left:14px;top:14px;width:16px;height:16px;border-radius:50%;
    background:rgba(255,255,255,.85);border:2px solid var(--ink);z-index:3;
  }
  #travel-log-root .photo-card-badges{
    position:absolute;right:12px;top:12px;display:flex;gap:6px;flex-direction:column;align-items:flex-end;z-index:3;
  }
  #travel-log-root .pc-chip{
    font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;
    padding:4px 9px;border-radius:999px;backdrop-filter:blur(2px);
    background:rgba(255,255,255,.9);color:var(--ink);border:1px solid rgba(20,51,91,.18);
  }
  #travel-log-root .pc-chip.domestic{color:var(--sage);}
  #travel-log-root .pc-chip.intl{color:var(--ink);}
  #travel-log-root .pc-chip.status-upcoming{color:var(--gold);}
  #travel-log-root .pc-chip.status-ongoing{color:var(--sage);}
  #travel-log-root .pc-chip.status-past{color:var(--ink-70);}
  #travel-log-root .photo-card-edit{
    position:absolute;right:12px;bottom:12px;z-index:4;background:rgba(255,255,255,.92);
    border:1px solid rgba(20,51,91,.18);border-radius:999px;width:28px;height:28px;
    display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink);
    box-shadow:0 1px 4px rgba(20,51,91,.25);
  }
  #travel-log-root .photo-card-edit:hover{background:var(--white);}
  #travel-log-root .photo-card-overlay{
    position:absolute;left:0;right:0;bottom:0;padding:34px 16px 14px;
    background:linear-gradient(to top, rgba(20,51,91,.92), rgba(20,51,91,.55) 60%, transparent);
    color:var(--paper);z-index:2;
  }
  #travel-log-root .photo-card-overlay .dest{
    font-family:var(--font-display);font-weight:700;font-size:20px;margin:0 0 2px;
  }
  #travel-log-root .photo-card-overlay .sub{font-size:12.5px;color:#CFE6F8;margin:0;}
  #travel-log-root .photo-card-overlay .meta{
    font-family:var(--font-mono);font-size:11.5px;color:var(--gold);margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;
  }

  /* ---------- empty state ---------- */
  #travel-log-root .empty{
    text-align:center;padding:60px 20px;border:1.5px dashed var(--line);border-radius:var(--radius);color:var(--ink-70);
  }
  #travel-log-root .empty .stamp{font-family:var(--font-display);font-size:44px;margin-bottom:6px;}
  #travel-log-root .empty h3{font-family:var(--font-display);margin:6px 0 4px;color:var(--ink);}
  #travel-log-root .empty p{font-size:13.5px;margin:0 0 18px;}

  /* ---------- trip detail ---------- */
  #travel-log-root .back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  #travel-log-root .back-row .back{
    font-family:var(--font-mono);font-size:12.5px;color:var(--ink-70);background:none;display:flex;align-items:center;gap:4px;
  }
  #travel-log-root .back-row .back:hover{color:var(--ink);}
  #travel-log-root .trip-banner{
    background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:20px 22px;margin-bottom:18px;position:relative;
    overflow:hidden;
  }
  #travel-log-root .trip-banner.has-photo{padding:0;}
  #travel-log-root .trip-banner .banner-photo{width:100%;height:150px;background-size:cover;background-position:center;}
  #travel-log-root .trip-banner .banner-body{padding:18px 22px;position:relative;}
  #travel-log-root .trip-banner .dest{font-family:var(--font-display);font-size:26px;font-weight:700;margin:0 0 2px;}
  #travel-log-root .trip-banner .name{margin:0;font-size:13px;color:#B9D6EF;}
  #travel-log-root .trip-banner .dates{font-family:var(--font-mono);font-size:12.5px;margin-top:10px;color:var(--gold);}
  #travel-log-root .trip-banner .stampcircle{
    position:absolute;right:18px;top:18px;width:56px;height:56px;border:2px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:var(--font-mono);color:var(--gold);transform:rotate(-8deg);
  }
  #travel-log-root .trip-banner .stampcircle b{font-size:16px;line-height:1;}
  #travel-log-root .trip-banner .stampcircle span{font-size:8px;letter-spacing:.05em;}
  #travel-log-root .trip-banner .type-chip{
    font-family:var(--font-mono);font-size:10.5px;padding:3px 9px;border-radius:999px;border:1px solid var(--gold);color:var(--gold);
    display:inline-block;margin-top:8px;
  }

  /* ---------- tabs (trip detail) ---------- */
  #travel-log-root .tabs{display:flex;gap:4px;border-bottom:1.5px solid var(--line);margin-bottom:20px;overflow-x:auto;}
  #travel-log-root .tab{
    background:none;padding:10px 14px;font-size:13.5px;font-weight:700;color:var(--ink-70);border-bottom:2.5px solid transparent;white-space:nowrap;
  }
  #travel-log-root .tab.active{color:var(--ink);border-color:var(--stamp);}

  /* ---------- cards / lists ---------- */
  #travel-log-root .panel{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;margin-bottom:16px;}
  #travel-log-root .panel h3{font-family:var(--font-display);margin:0 0 14px;font-size:16px;}
  #travel-log-root .panel h3 small{font-family:var(--font-mono);font-size:11px;color:var(--ink-70);font-weight:400;margin-left:8px;}
  #travel-log-root .item-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:12px 0;border-top:1px solid var(--paper-2);}
  #travel-log-root .item-row.clickable{cursor:pointer;border-radius:10px;transition:background .12s ease;}
  #travel-log-root .item-row.clickable:hover{background:var(--paper-2);}
  #travel-log-root .item-row:first-of-type{border-top:none;}
  #travel-log-root .item-main{flex:1;min-width:0;}
  /* image stretches to match the height of the text column beside it */
  #travel-log-root .item-row.with-thumb{align-items:stretch;}
  #travel-log-root .item-thumb{width:64px;height:auto;align-self:stretch;object-fit:cover;border-radius:8px;border:1px solid var(--line);flex-shrink:0;}
  #travel-log-root .item-title{font-weight:700;font-size:14px;margin:0 0 2px;}
  #travel-log-root .item-sub{font-size:12.5px;color:var(--ink-70);margin:0;}
  #travel-log-root .tagchip{
    display:inline-block;font-family:var(--font-mono);font-size:10.5px;padding:2px 8px;border-radius:999px;color:var(--white);margin-right:6px;
  }
  #travel-log-root .amount{font-family:var(--font-mono);font-weight:700;font-size:14.5px;white-space:nowrap;}
  #travel-log-root .amount small{display:block;font-weight:400;font-size:11px;color:var(--ink-70);}

  /* forms */
  #travel-log-root .field{margin-bottom:14px;}
  #travel-log-root label{display:block;font-size:12px;font-weight:700;color:var(--ink-70);margin-bottom:5px;letter-spacing:.02em;}
  #travel-log-root input, #travel-log-root select, #travel-log-root textarea{
    width:100%;font-family:var(--font-body);font-size:14px;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink);
  }
  #travel-log-root input:focus, #travel-log-root select:focus, #travel-log-root textarea:focus{outline:2px solid var(--gold);outline-offset:1px;border-color:var(--gold);}
  #travel-log-root input[type=file]{padding:8px;font-size:12.5px;}
  #travel-log-root input[type=checkbox]{width:16px;height:16px;flex:none;accent-color:var(--sage);}
  #travel-log-root label.check-label{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:400;color:var(--ink);cursor:pointer;}
  #travel-log-root .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  #travel-log-root .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
  @media(max-width:520px){#travel-log-root .row3{grid-template-columns:1fr 1fr;}}

  /* modal */
  #travel-log-root .modal-overlay{position:fixed;inset:0;background:rgba(20,51,91,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
  @media(min-width:640px){#travel-log-root .modal-overlay{align-items:center;}}
  #travel-log-root .modal{background:var(--paper);width:100%;max-width:480px;border-radius:18px 18px 0 0;padding:22px 22px 26px;max-height:88vh;overflow-y:auto;}
  @media(min-width:640px){#travel-log-root .modal{border-radius:18px;}}
  #travel-log-root .modal h3{font-family:var(--font-display);margin:0 0 16px;font-size:19px;}
  #travel-log-root .modal-actions{display:flex;gap:10px;margin-top:6px;}
  #travel-log-root .modal-note{font-size:12px;color:var(--ink-70);margin:-6px 0 14px;}
  #travel-log-root .scan-status{
    display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:12.5px;color:var(--gold);
    padding:10px 12px;background:var(--paper-2);border-radius:9px;margin-bottom:14px;
  }
  #travel-log-root .spin{width:13px;height:13px;border-radius:50%;border:2px solid var(--gold);border-top-color:transparent;animation:tl-spin .7s linear infinite;}
  @keyframes tl-spin{to{transform:rotate(360deg);}}

  /* converter */
  #travel-log-root .converter-box{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  #travel-log-root .converter-input{flex:1;min-width:140px;}
  #travel-log-root .swap{background:var(--paper-2);border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--ink);flex-shrink:0;}
  #travel-log-root .rate-line{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-70);margin-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  #travel-log-root .rate-line input{width:90px;padding:5px 8px;font-size:12.5px;}

  /* budget bar */
  #travel-log-root .budget-bar-track{height:8px;border-radius:999px;background:var(--paper-2);overflow:hidden;margin-top:8px;}
  #travel-log-root .budget-bar-fill{height:100%;border-radius:999px;background:var(--sage);}
  #travel-log-root .budget-bar-fill.over{background:var(--danger);}

  /* ---------- expense two-column grid ---------- */
  #travel-log-root .expense-items-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;}
  @media (max-width:600px){
    #travel-log-root .expense-items-grid{grid-template-columns:1fr;}
  }
  #travel-log-root .expense-items-grid .item-row,
  #travel-log-root .expense-items-grid .item-row:first-of-type{
    border:1px solid var(--line);border-radius:10px;padding:12px 14px;background:var(--paper);align-items:flex-start;
  }

  /* ---------- category budget cards ---------- */
  #travel-log-root .cat-budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px;}
  @media (max-width:600px){
    #travel-log-root .cat-budget-grid{grid-template-columns:1fr 1fr;}
  }
  @media (max-width:380px){
    #travel-log-root .cat-budget-grid{grid-template-columns:1fr;}
  }
  #travel-log-root .cat-budget-card{
    display:block;width:100%;text-align:left;font-family:var(--font-body);
    border:1px solid var(--line);border-radius:12px;padding:14px 16px;background:var(--white);
    transition:box-shadow .15s ease, transform .15s ease;
  }
  #travel-log-root .cat-budget-card:hover{box-shadow:0 6px 16px rgba(20,51,91,.12);transform:translateY(-1px);}
  #travel-log-root .cat-budget-card:active{transform:scale(.98);}
  #travel-log-root .cbg-title{font-size:14px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  #travel-log-root .cbg-amount{font-family:var(--font-mono);font-weight:700;font-size:16px;margin-bottom:4px;}
  #travel-log-root .cbg-status{font-size:12.5px;font-weight:700;}
  #travel-log-root .cbg-status.ok{color:var(--sage);}
  #travel-log-root .cbg-status.over{color:var(--danger);}
  #travel-log-root .cbg-status.neutral{color:var(--ink-70);font-weight:400;}

  /* checklist */
  #travel-log-root .check-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--paper-2);}
  #travel-log-root .check-row:first-of-type{border-top:none;}
  #travel-log-root .checkbox{
    width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;flex-shrink:0;
    background:var(--paper);color:var(--white);font-size:12px;font-weight:900;
  }
  #travel-log-root .checkbox.checked{background:var(--sage);border-color:var(--sage);}
  #travel-log-root .check-row .txt{flex:1;font-size:14px;}
  #travel-log-root .check-row.checked .txt{text-decoration:line-through;color:var(--ink-70);}
  #travel-log-root .progress-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:var(--font-mono);font-size:12.5px;color:var(--ink-70);}

  /* notes */
  #travel-log-root .note-row{padding:12px 14px;border-radius:10px;background:var(--paper-2);margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;}
  #travel-log-root .note-row.important{background:#FBE1E6;}
  #travel-log-root .note-row .mark{font-size:14px;flex-shrink:0;}
  #travel-log-root .note-row p{margin:0;font-size:13.5px;flex:1;}

  #travel-log-root .quick-add{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  #travel-log-root .quick-add input{flex:1;min-width:140px;}
  #travel-log-root .pack-grid{display:grid;grid-template-columns:1fr 1fr;column-gap:24px;}
  #travel-log-root .pack-group{min-width:0;}
  @media (max-width:520px){
    #travel-log-root .pack-grid{grid-template-columns:1fr;}
  }

  #travel-log-root .day-badge{
    font-family:var(--font-mono);font-size:11px;font-weight:700;background:var(--ink);color:var(--paper);padding:3px 9px;border-radius:6px;display:inline-block;margin-bottom:4px;
  }
  #travel-log-root .day-panel{margin-bottom:14px;}
  #travel-log-root .day-panel-head{display:flex;align-items:baseline;gap:10px;margin-bottom:8px;}
  #travel-log-root .day-panel-head .day-num{font-family:var(--font-display);font-weight:700;font-size:17px;}
  #travel-log-root .day-panel-head .day-date{font-family:var(--font-mono);font-size:12px;color:var(--ink-70);}

  /* day filter bar (itinerary) */
  #travel-log-root .day-filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;}
  #travel-log-root .day-filter-btn{
    font-family:var(--font-mono);font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;
    padding:7px 13px;border-radius:999px;background:var(--white);color:var(--ink-70);border:1.5px solid var(--line);
  }
  #travel-log-root .day-filter-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  /* itinerary transport meta */
  #travel-log-root .item-transport{
    display:flex;flex-wrap:wrap;gap:4px 10px;font-size:12px;color:var(--ink-70);margin-top:4px;font-family:var(--font-mono);
  }
  #travel-log-root .item-transport .rsv-yes{color:var(--sage);font-weight:700;}
  #travel-log-root .item-transport .rsv-no{color:var(--danger);font-weight:700;}

  /* stats view */
  #travel-log-root .stat-hero{background:var(--ink);color:var(--paper);border-radius:var(--radius);padding:26px 24px;margin-bottom:18px;text-align:center;}
  #travel-log-root .stat-hero .num{font-family:var(--font-display);font-size:44px;font-weight:700;color:var(--gold);}
  #travel-log-root .stat-hero .lbl{font-size:13px;color:#C9E3F7;margin-top:2px;}
  #travel-log-root .stat-hero .top-country{margin-top:16px;padding-top:16px;border-top:1px dashed rgba(255,255,255,.25);font-family:var(--font-mono);font-size:12.5px;color:var(--gold);}
  #travel-log-root .stat-hero .top-country b{font-family:var(--font-display);font-size:20px;color:var(--paper);display:block;margin-top:2px;}

    font-family:var(--font-mono);font-size:11px;color:var(--ink-70);letter-spacing:.06em;margin:16px 0 8px;text-transform:uppercase;

  #travel-log-root .doc-cat-head:first-child{margin-top:0;}

<div id="travel-log-root">
  <div id="tl-app"></div>
</div>

<script>
(function(){
  const EXPENSE_CATS = [
    {key:'餐飲',color:'#2563EB',icon:'🍜'},
    {key:'交通',color:'#0F9B8E',icon:'🚗'},
    {key:'住宿',color:'#14335B',icon:'🏨'},
    {key:'購物',color:'#38BDF8',icon:'🛍️'},
    {key:'門票',color:'#5B6EE1',icon:'🎫'},
    {key:'其他',color:'#7A93AC',icon:'📦'}
  ];
  const PACK_CATS = ['證件','衣物','3C 電子','盥洗用品','化妝品','隨身','其他'];
  const BOOKING_SITES = ['Booking.com','Agoda','Trip.com','Expedia','Hotels.com','Airbnb','飯店官網','其他'];
  const TERMINALS = ['不指定','第 1 航廈','第 2 航廈','第 3 航廈'];
  const BAGGAGE_TYPES = [
    {key:'personal', label:'隨身行李'},
    {key:'carryon', label:'手提行李'},
    {key:'checked', label:'托運行李'}
  ];
  const PAYMENT_METHODS = [
    {key:'credit', label:'信用卡'},
    {key:'foreign_cash', label:'外幣現金'},
    {key:'home_cash', label:'台幣現金'}
  ];
  const BANKS = ['國泰','玉山','中信','其他'];
  const TAX_REFUND_STATUSES = [
    {key:'pending', label:'尚未退稅'},
    {key:'cash', label:'已退稅（退外幣現金）'},
    {key:'credit', label:'已退稅（退信用卡）'}
  ];
  const DOC_CATS = ['護照','台胞證','簽證','航空會員'];
  const ITIN_TAGS = [
    {key:'交通',color:'#2563EB'},
    {key:'景點',color:'#0F9B8E'},
    {key:'美食',color:'#38BDF8'},
    {key:'住宿',color:'#8B5CF6'}
  ];
  const TOP_NAV = [
    {key:'home', label:'旅程列表'},
    {key:'stats', label:'統計總覽'},
    {key:'frequentFlights', label:'常搭乘航空'},
    {key:'bookingSites', label:'訂房統計'},
    {key:'documents', label:'證件與會員'}
  ];
  const RESERVATION_TYPES = [
    {key:'reservation', label:'預約制'},
    {key:'walkin', label:'現場排隊'}
  ];

  let state = {
    view: 'home', // home | trip | stats | frequentFlights | bookingSites | documents
    tripId: null,
    tab: 'itinerary',
    itinFilterDate: null, // null = show all days, otherwise a YYYY-MM-DD string
    expenseCatView: null, // null = normal expenses tab, otherwise a category key
    trips: [],
    tripData: null,
    airlineStats: null,
    airlineStatsLoading: false,
    bookingSiteStats: null,
    bookingSiteStatsLoading: false,
    documents: [],
    loading: true,
    modal: null,
    scanning: false,
    scanError: null,
    authLocked: true,
    authError: null
  };

  const root = document.getElementById('tl-app');
  const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);

  // ---------------- FIREBASE 登入 + GOOGLE DRIVE 儲存 ----------------
  // 1. 到 https://console.firebase.google.com 建立專案，新增一個「網頁應用程式」，
  //    把產生的設定值貼到下面的 firebaseConfig。
  // 2. 到 Authentication > Sign-in method，開啟「Google」登入提供者。
  // 3. 到 Authentication > Settings > 已授權網域，加入你的網站網域
  //    (例如 yician0830.github.io，不用加路徑)。
  const firebaseConfig = {
    apiKey: "請填入你的-API-KEY",
    authDomain: "請填入你的專案.firebaseapp.com",
    projectId: "請填入你的-PROJECT-ID",
    storageBucket: "請填入你的專案.appspot.com",
    messagingSenderId: "請填入你的-SENDER-ID",
    appId: "請填入你的-APP-ID"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const googleProvider = new firebase.auth.GoogleAuthProvider();
  // 除了登入本人身份，額外要求 Google Drive appdata 權限，讓 App 能把旅程資料存到使用者的 Drive。
  googleProvider.addScope('https://www.googleapis.com/auth/drive.appdata');

  let accessToken = null;
  let googleUser = null;          // { name, email, picture }
  let driveIndex = {};            // 檔名(key) -> Google Drive fileId 的對照表

  function lockOut(message){
    state.authLocked = true;
    state.authError = message || null;
    state.loading = false;
    accessToken = null;
    render();
  }

  // 透過 Firebase 的 GoogleAuthProvider 彈出 Google 登入視窗，並從回傳的
  // OAuthCredential 取出可呼叫 Google Drive API 的 access token。
  // 必須由使用者的點擊觸發，否則瀏覽器的彈出視窗封鎖機制通常會擋下來。
  async function requestDriveAccessToken(){
    googleProvider.setCustomParameters({ prompt:'select_account' });
    const result = await auth.signInWithPopup(googleProvider);
    const credential = firebase.auth.GoogleAuthProvider.credentialFromResult(result);
    if(!credential || !credential.accessToken) throw new Error('no access token');
    accessToken = credential.accessToken;
  }

  async function driveFetch(url, options){
    options = options || {};
    options.headers = Object.assign({ 'Authorization': 'Bearer ' + accessToken }, options.headers || {});
    const res = await fetch(url, options);
    if(res.status === 401){
      lockOut('登入已過期，請重新使用 Google 登入。');
      throw new Error('unauthorized');
    }
    return res;
  }

  async function buildDriveIndex(){
    driveIndex = {};
    let pageToken = '';
    do{
      const url = 'https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=nextPageToken,files(id,name)&pageSize=1000'
        + (pageToken ? '&pageToken='+encodeURIComponent(pageToken) : '');
      const res = await driveFetch(url);
      const data = await res.json();
      (data.files||[]).forEach(f=>{ driveIndex[f.name] = f.id; });
      pageToken = data.nextPageToken || '';
    } while(pageToken);
  }

  async function safeGet(key){
    try{
      const id = driveIndex[key];
      if(!id) return null;
      const res = await driveFetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media');
      if(!res.ok) return null;
      const text = await res.text();
      return text ? JSON.parse(text) : null;
    }
    catch(e){ console.error('storage get failed', e); return null; }
  }
  async function safeSet(key, value){
    try{
      const content = JSON.stringify(value);
      const id = driveIndex[key];
      if(id){
        await driveFetch('https://www.googleapis.com/upload/drive/v3/files/'+id+'?uploadType=media', {
          method:'PATCH',
          headers:{'Content-Type':'application/json'},
          body: content
        });
      } else {
        const boundary = '-------tl'+Date.now();
        const metadata = { name:key, parents:['appDataFolder'] };
        const body =
          '--'+boundary+'\r\n'+
          'Content-Type: application/json; charset=UTF-8\r\n\r\n'+
          JSON.stringify(metadata)+'\r\n'+
          '--'+boundary+'\r\n'+
          'Content-Type: application/json\r\n\r\n'+
          content+'\r\n'+
          '--'+boundary+'--';
        const res = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
          method:'POST',
          headers:{'Content-Type':'multipart/related; boundary='+boundary},
          body: body
        });
        const data = await res.json();
        if(data && data.id) driveIndex[key] = data.id;
      }
    }
    catch(e){ console.error('storage set failed', e); }
  }
  async function safeDelete(key){
    try{
      const id = driveIndex[key];
      if(!id) return;
      await driveFetch('https://www.googleapis.com/drive/v3/files/'+id, { method:'DELETE' });
      delete driveIndex[key];
    }
    catch(e){ /* key may not exist, ignore */ }
  }

  async function loadTrips(){ state.trips = (await safeGet('trips')) || []; }
  async function saveTrips(){ await safeSet('trips', state.trips); }
  async function loadTripData(id){
    const d = await safeGet('trip-data:'+id);
    state.tripData = Object.assign({itinerary:[], expenses:[], notes:[], packing:[], flights:[], hotels:[], todos:[]}, d || {});
  }
  async function saveTripData(){ await safeSet('trip-data:'+state.tripId, state.tripData); }
  async function computeAirlineStats(){
    const counts = {};
    for(const trip of state.trips){
      const d = await safeGet('trip-data:'+trip.id);
      if(d && Array.isArray(d.flights)){
        d.flights.forEach(f=>{
          const name = (f.airline||'').trim();
          if(!name) return;
          counts[name] = (counts[name]||0) + 1;
        });
      }
    }
    return Object.entries(counts).map(([airline,count])=>({airline,count})).sort((a,b)=> b.count - a.count);
  }
  async function computeBookingSiteStats(){
    const counts = {};
    for(const trip of state.trips){
      const d = await safeGet('trip-data:'+trip.id);
      if(d && Array.isArray(d.hotels)){
        d.hotels.forEach(h=>{
          const site = (h.bookingSite||'').trim();
          if(!site) return;
          if(!counts[site]) counts[site] = {site, count:0, bookings:[]};
          counts[site].count += 1;
          counts[site].bookings.push({tripName: trip.name, hotelName: h.name, checkinDate: h.checkinDate});
        });
      }
    }
    return Object.values(counts).sort((a,b)=> b.count - a.count);
  }
  async function loadDocuments(){ state.documents = (await safeGet('travel-documents')) || []; }
  async function saveDocuments(){ await safeSet('travel-documents', state.documents); }

  function fmtMoney(n){ n = Number(n)||0; return n.toLocaleString('zh-TW',{maximumFractionDigits:2}); }
  function tripStatus(trip){
    const today = new Date().toISOString().slice(0,10);
    if(trip.endDate < today) return {key:'past', label:'已結束'};
    if(trip.startDate > today) return {key:'upcoming', label:'即將出發'};
    return {key:'ongoing', label:'進行中'};
  }
  function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/86400000); }
  function catColor(list, key){ const f = list.find(c=>(c.key||c)===key); return f ? (f.color||'#7A93AC') : '#7A93AC'; }
  function formatBaggage(baggage){
    if(!baggage) return '';
    const parts = BAGGAGE_TYPES.map(t=>{
      const b = baggage[t.key];
      if(!b || (!b.count && !b.kg)) return '';
      const bits = [];
      if(b.count) bits.push(`${b.count} 件`);
      if(b.kg) bits.push(`${b.kg} kg`);
      return `${t.label} ${bits.join(' ')}`;
    }).filter(Boolean);
    return parts.join('　');
  }
  function readBaggageFields(){
    const baggage = {};
    BAGGAGE_TYPES.forEach(t=>{
      const countEl = document.getElementById(`m-bag-${t.key}-count`);
      const kgEl = document.getElementById(`m-bag-${t.key}-kg`);
      const count = countEl && countEl.value ? parseInt(countEl.value) : null;
      const kg = kgEl && kgEl.value ? parseFloat(kgEl.value) : null;
      if(count || kg) baggage[t.key] = {count, kg};
    });
    return baggage;
  }
  function formatPayment(e){
    const pm = PAYMENT_METHODS.find(p=>p.key===e.payMethod);
    if(!pm) return '';
    let s = pm.label;
    if(e.payMethod === 'credit' && e.bank){
      const bits = [e.bank];
      if(e.rewards) bits.push('有回饋');
      if(e.feeAmount) bits.push(`手續費 ${e.currency} ${fmtMoney(e.feeAmount)}`);
      else if(e.feePct) bits.push(`手續費 ${e.feePct}%`);
      s += `（${bits.join('・')}）`;
    }
    return s;
  }
  function formatTaxRefund(e){
    if(!e.taxRefundEligible) return '';
    const st = TAX_REFUND_STATUSES.find(s=>s.key===e.taxRefundStatus);
    return `可退稅${st ? '・'+st.label : ''}`;
  }
  function currentTrip(){ return state.trips.find(t => t.id === state.tripId); }
  function toHomeCurrency(amount, currency, trip){ return currency === trip.homeCurrency ? amount : amount * trip.exchangeRate; }
  function expenseTotal(e){ return Number(e.amount||0) + Number(e.feeAmount||0); }
  function esc(s){
    if(s===undefined||s===null) return '';
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }
  function daysUntil(dateStr){
    if(!dateStr) return null;
    return Math.round((new Date(dateStr) - new Date(new Date().toISOString().slice(0,10)))/86400000);
  }
  function compressImage(file, maxWidth, quality){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = (e)=>{
        const img = new Image();
        img.onload = ()=>{
          let w = img.width, h = img.height;
          if(w > maxWidth){ h = Math.round(h * (maxWidth / w)); w = maxWidth; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------------- RENDER ----------------
  function render(){
    if(state.authLocked){ renderLockScreen(); return; }
    if(state.loading){
      root.innerHTML = `<div class="container" style="padding-top:60px;text-align:center;color:var(--ink-70);font-family:var(--font-mono);font-size:13px;">載入中…</div>`;
      return;
    }
    if(state.view === 'home') renderHome();
    else if(state.view === 'stats') renderStats();
    else if(state.view === 'frequentFlights') renderFreqFlights();
    else if(state.view === 'bookingSites') renderBookingSites();
    else if(state.view === 'documents') renderDocuments();
    else renderTrip();

    if(state.modal) renderModal();
  }

  function renderLockScreen(){
    root.innerHTML = `
      <div class="app-header">
        <div class="container">
          <p class="eyebrow">Travel Log · 旅程手札</p>
          <h1>我的旅遊紀錄</h1>
        </div>
      </div>
      <div class="container" style="padding-top:30px;max-width:380px;">
        <div class="empty" style="text-align:left;padding:32px 24px;">
          <div class="stamp" style="text-align:center;">🔒</div>
          <h3 style="text-align:center;">請使用 Google 登入</h3>
          <p style="text-align:center;">登入後，你的旅遊資料會安全地儲存在你自己的 Google 雲端硬碟中，只有你能存取。</p>
          ${state.authError ? `<p style="color:var(--danger);font-size:12.5px;text-align:center;margin:8px 0 0;">${esc(state.authError)}</p>` : ''}
          <button class="btn gold block" style="margin-top:18px;" onclick="TL.signIn()">使用 Google 登入</button>
        </div>
      </div>`;
  }

  function shellHeader(){
    return `
      <div class="app-header">
        <div class="container" style="position:relative;">
          <p class="eyebrow">Travel Log · 旅程手札</p>
          <h1>我的旅遊紀錄</h1>
          <p>行程明細、花費、匯率換算、注意事項與行李清單，通通記在這裡。</p>
          ${googleUser ? `<p style="font-size:12px;color:#C9E3F7;margin-top:4px;">已登入：${esc(googleUser.email || googleUser.name || '')}</p>` : ''}
          <button class="icon-btn" style="position:absolute;right:20px;top:20px;color:var(--paper);" onclick="TL.logout()" title="登出">🔒 登出</button>
        </div>
      </div>`;
  }
  function topNav(active){
    return `<div class="toplevel-nav">${TOP_NAV.map(i=>`<button class="${active===i.key?'active':''}" onclick="TL.setView('${i.key}')">${i.label}</button>`).join('')}</div>`;
  }

  function renderHome(){
    let cards = '';
    if(state.trips.length === 0){
      cards = `
        <div class="empty">
          <div class="stamp">✈️</div>
          <h3>還沒有旅程紀錄</h3>
          <p>建立第一趟旅程，開始記錄行程、花費與行李清單。</p>
          <button class="btn gold" onclick="TL.openModal('newTrip')">+ 新增旅程</button>
        </div>`;
    }else{
      const today = new Date().toISOString().slice(0,10);
      const sorted = [...state.trips].sort((a,b)=> Math.abs(daysBetween(today,a.startDate)) - Math.abs(daysBetween(today,b.startDate)));
      cards = `<div class="trip-grid">` + sorted.map(trip=>{
        const st = tripStatus(trip);
        const nights = daysBetween(trip.startDate, trip.endDate);
        const isDomestic = trip.tripType === 'domestic';
        const imgHtml = trip.coverImage
          ? `<div class="photo-card-img" style="background-image:url('${trip.coverImage}');opacity:.8;"></div>`
          : `<div class="photo-card-img placeholder ${isDomestic?'domestic':'intl'}" data-icon="${isDomestic?'🏞️':'🌍'}"></div>`;
        return `
        <div class="photo-card" onclick="TL.openTrip('${trip.id}')">
          <div class="photo-card-hole"></div>
          ${imgHtml}
          <div class="photo-card-badges">
            <span class="pc-chip ${isDomestic?'domestic':'intl'}">${isDomestic?'國內旅遊':'國外旅遊'}</span>
            <span class="pc-chip status-${st.key}">${st.label}</span>
          </div>
          <button class="icon-btn photo-card-edit" title="編輯旅程" onclick="event.stopPropagation();TL.openEditTrip('${trip.id}')">✎</button>
          <div class="photo-card-overlay">
            <p class="dest">${esc(trip.country)} · ${esc(trip.destination)}</p>
            <p class="sub">${esc(trip.name)}</p>
            <div class="meta">
              <span>${trip.startDate} → ${trip.endDate}</span>
              <span>${nights} 天</span>
              <span>${esc(trip.localCurrency)} → ${esc(trip.homeCurrency)}</span>
            </div>
          </div>
        </div>`;
      }).join('') + `</div>`;
    }

    root.innerHTML = `
      ${shellHeader()}
      <div class="container">
        ${topNav('home')}
        <div class="header-actions">
          <button class="btn gold" onclick="TL.openModal('newTrip')">+ 新增旅程</button>
        </div>
        ${cards}
      </div>`;
  }

  function renderStats(){
    const counts = {};
    let domesticCount = 0, intlCount = 0;
    state.trips.forEach(t=>{
      const key = t.country || '未分類';
      counts[key] = (counts[key]||0)+1;
      if(t.tripType === 'domestic') domesticCount++; else intlCount++;
    });
    const ranked = Object.entries(counts).sort((a,b)=> b[1]-a[1]);
    const top = ranked[0];
    const maxCount = ranked.length ? ranked[0][1] : 0;

    root.innerHTML = `
      ${shellHeader()}
      <div class="container">
        ${topNav('stats')}
        <div class="stat-hero">
          <div class="num">${state.trips.length}</div>
          <div class="lbl">趟旅程紀錄</div>
          <div class="split">
            <div>國內旅遊<b>${domesticCount}</b></div>
            <div>國外旅遊<b>${intlCount}</b></div>
          </div>

    const tabs = [

      {key:'notes', label:'注意事項'},
      {key:'packing', label:'行李清單'}
    ];

    root.innerHTML = `
      <div class="container" style="padding-top:24px;">
        <div class="back-row" style="justify-content:space-between;">
          <button class="back" onclick="TL.goHome()">← 回旅程列表</button>
          <button class="btn ghost sm" onclick="TL.openEditTrip('${trip.id}')">✎ 編輯旅程</button>

            <div class="stampcircle"><b>${nights}</b><span>天</span></div>
            <p class="dest">${esc(trip.country)} · ${esc(trip.destination)}</p>
            <p class="name">${esc(trip.name)}</p>

          </div>

        <div class="tabs">

    else if(state.tab==='todo') c.innerHTML = renderTodo(trip);
    else if(state.tab==='expenses') c.innerHTML = renderExpenses(trip);
    else if(state.tab==='travel') c.innerHTML = renderTravelInfo(trip);
    else if(state.tab==='notes') c.innerHTML = renderNotes(trip);

  function itinTransportLine(it){
    const bits = [];
    if(it.transportMode) bits.push(`🚦 ${esc(it.transportMode)}`);
    if(it.transportDuration) bits.push(`⏱ ${esc(it.transportDuration)}`);
    if(it.address) bits.push(`📍 ${esc(it.address)}`);
    if(it.reservationType){
      const rt = RESERVATION_TYPES.find(r=>r.key===it.reservationType);
      if(rt){
        if(it.reservationType === 'reservation'){
          if(it.reserved){
            bits.push(`<span class="rsv-yes">✓ 已預約</span>`);
          }else{
            bits.push(`<span class="rsv-no">✕ 尚未預約</span>${it.reservationOpenDate ? ` (開放預約：${it.reservationOpenDate})` : ''}`);
          }
        }else{
          bits.push(`🎫 ${rt.label}`);
        }
      }
    }
    if(!bits.length) return '';
    return `<div class="item-transport">${bits.join('<span style="opacity:.4;">・</span>')}</div>`;
  }
  function itinItemRow(it){
    return `
      <div class="item-row clickable ${it.image?'with-thumb':''}" onclick="TL.openEditItin('${it.id}')">
        ${it.image ? `<img src="${it.image}" class="item-thumb" alt="">` : ''}
        <div class="item-main">
          ${it.time ? `<span class="day-badge">${it.time}</span>` : ''}
          ${it.tag ? `<span class="tagchip" style="background:${catColor(ITIN_TAGS, it.tag)};">${esc(it.tag)}</span>` : ''}
          <p class="item-title">${esc(it.title)}</p>
          ${it.note? `<p class="item-sub">${esc(it.note)}</p>` : ''}
          ${itinTransportLine(it)}
        </div>
        <button class="icon-btn danger" onclick="event.stopPropagation(); TL.deleteItin('${it.id}')">✕</button>
      </div>`;
  }
  function renderItinerary(trip){
    const totalDays = daysBetween(trip.startDate, trip.endDate) + 1;
    const byDate = {};
    state.tripData.itinerary.forEach(it=>{ (byDate[it.date] = byDate[it.date]||[]).push(it); });

    // build list of day meta {dateStr, label} for both the filter bar and the panels
    const dayList = [];
    for(let i=0;i<totalDays;i++){
      const d = new Date(trip.startDate);
      d.setDate(d.getDate()+i);
      dayList.push({dateStr: d.toISOString().slice(0,10), label:`Day ${i+1}`});
    }
    const leftoverDates = Object.keys(byDate).filter(ds => !dayList.some(d=>d.dateStr===ds)).sort();

    const filterBar = `
      <div class="day-filter-bar">
        <button class="day-filter-btn ${!state.itinFilterDate?'active':''}" onclick="TL.setItinFilter(null)">全部</button>
        ${dayList.map(d=>`<button class="day-filter-btn ${state.itinFilterDate===d.dateStr?'active':''}" onclick="TL.setItinFilter('${d.dateStr}')">${d.label}</button>`).join('')}
        ${leftoverDates.map(ds=>`<button class="day-filter-btn ${state.itinFilterDate===ds?'active':''}" onclick="TL.setItinFilter('${ds}')">${ds}</button>`).join('')}
      </div>`;

    let panels = '';
    dayList.forEach((d,i)=>{
      if(state.itinFilterDate && state.itinFilterDate !== d.dateStr) return;
      const dateStr = d.dateStr;
      const items = (byDate[dateStr]||[]).slice().sort((a,b)=> (a.time||'').localeCompare(b.time||''));
      panels += `
        <div class="day-panel panel">
          <div class="day-panel-head"><span class="day-num">${d.label}</span><span class="day-date">${dateStr}</span></div>
          ${items.length===0 ? `<p style="color:var(--ink-70);font-size:13px;margin:6px 0 10px;">這天還沒有安排行程。</p>` : items.map(itinItemRow).join('')}
          <button class="btn gold sm" style="margin-top:8px;" onclick="TL.openModal('newItin','${dateStr}')">+ 新增這天的行程</button>
        </div>`;
    });
    if(!state.itinFilterDate && leftoverDates.length){
      panels += `<div class="day-panel panel"><div class="day-panel-head"><span class="day-num">其他日期</span></div>`;
      leftoverDates.forEach(dateStr=>{
        byDate[dateStr].forEach(it=>{ panels += itinItemRow(it); });
      });
      panels += `</div>`;
    }else if(state.itinFilterDate && leftoverDates.includes(state.itinFilterDate)){
      panels += `<div class="day-panel panel"><div class="day-panel-head"><span class="day-num">${state.itinFilterDate}</span></div>`;
      byDate[state.itinFilterDate].forEach(it=>{ panels += itinItemRow(it); });
      panels += `</div>`;
    }
    return filterBar + panels;
  }

  function renderCategoryBudgets(trip){
    const cb = trip.categoryBudgets || {};
    const spent = {};
    EXPENSE_CATS.forEach(c=> spent[c.key] = 0);
    state.tripData.expenses.forEach(e=>{
      spent[e.category] = (spent[e.category]||0) + toHomeCurrency(expenseTotal(e), e.currency, trip);
    });
    return `
      <div class="panel">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:2px;">
          <h3 style="margin:0;">類別預算</h3>
          <button class="btn ghost sm" onclick="TL.openModal('categoryBudgets')">設定預算</button>
        </div>
        <div class="cat-budget-grid">
          ${EXPENSE_CATS.map(cat=>{
            const s = spent[cat.key] || 0;
            const budgetVal = cb[cat.key];
            const hasBudget = budgetVal != null && Number(budgetVal) > 0;
            let statusHtml;
            if(!hasBudget){
              statusHtml = `<div class="cbg-status neutral">沒有預算限制</div>`;
            }else{
              const remain = Number(budgetVal) - s;
              statusHtml = remain >= 0
                ? `<div class="cbg-status ok">還能花 ${trip.homeCurrency} ${fmtMoney(remain)} 😊</div>`
                : `<div class="cbg-status over">已超支 ${trip.homeCurrency} ${fmtMoney(Math.abs(remain))} 😱</div>`;
            }
            return `
              <button type="button" class="cat-budget-card" onclick="TL.openCategoryExpenses('${cat.key}')">
                <div class="cbg-title">${cat.icon} ${cat.key}</div>
                <div class="cbg-amount">${trip.homeCurrency} ${fmtMoney(s)}</div>
                ${statusHtml}
              </button>`;
          }).join('')}
        </div>
      </div>`;
  }

  function expenseItemRow(e, trip, opts){
    opts = opts || {};
    const total = expenseTotal(e);
    const converted = toHomeCurrency(total, e.currency, trip);
    const showConverted = e.currency !== trip.homeCurrency;
    const payLine = formatPayment(e);
    const refundLine = formatTaxRefund(e);
    const feeNote = e.feeAmount ? `消費 ${fmtMoney(e.amount)} + 手續費 ${fmtMoney(e.feeAmount)}` : '';
    const subParts = [];
    if(opts.showCategory){
      const cat = EXPENSE_CATS.find(c=>c.key===e.category);
      if(cat) subParts.push(`<span class="tagchip" style="background:${cat.color};">${cat.key}</span>`);
    }
    if(payLine) subParts.push(esc(payLine));
    if(refundLine) subParts.push(esc(refundLine));
    return `
      <div class="item-row">
        <div class="item-main">
          <p class="item-title">${esc(e.desc)}${e.merchant ? ` · ${esc(e.merchant)}` : ''}</p>
          ${subParts.length ? `<p class="item-sub">${subParts.join(' ・ ')}</p>` : ''}
          ${feeNote ? `<p class="item-sub">${feeNote}</p>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="amount">${e.currency} ${fmtMoney(total)}
            ${showConverted ? `<small>≈ ${trip.homeCurrency} ${fmtMoney(converted)}</small>` : ''}
          </div>
          <button class="icon-btn" onclick="TL.openEditExpense('${e.id}')">✎</button>
          <button class="icon-btn danger" onclick="TL.deleteExpense('${e.id}')">✕</button>
        </div>
      </div>`;
  }

  function groupExpensesByDate(items){
    const grouped = {};
    items.forEach(e=>{ (grouped[e.date] = grouped[e.date]||[]).push(e); });
    return Object.keys(grouped).sort((a,b)=> b.localeCompare(a)).map(date=>({date, list: grouped[date]}));
  }

          <div class="amount">${trip.homeCurrency} ${fmtMoney(total)}</div>

      return renderCategoryExpenseDetail(trip, state.expenseCatView);

    const items = state.tripData.expenses;
    let total = 0;
    items.forEach(e => total += toHomeCurrency(expenseTotal(e), e.currency, trip));
    const hasBudget = trip.budget && Number(trip.budget) > 0;
    const pct = hasBudget ? Math.min(100, (total/Number(trip.budget))*100) : 0;

    const byDate = groupExpensesByDate(items);

    return `

  // ---------------- FORM DRAFT AUTOSAVE ----------------
  function modalDraftKey(m){
    if(!m) return null;
    const tripId = state.tripId || 'global';
    switch(m.type){
      case 'newTrip': return 'draft:trip:new';
      case 'editTrip': return 'draft:trip:edit:'+m.trip.id;
      case 'newItin': return 'draft:'+tripId+':itin:new';
      case 'editItin': return 'draft:'+tripId+':itin:edit:'+m.item.id;
      case 'newExpense': return 'draft:'+tripId+':expense:new';
      case 'editExpense': return 'draft:'+tripId+':expense:edit:'+m.expense.id;
      case 'newFlight': return 'draft:'+tripId+':flight:new';
      case 'editFlight': return 'draft:'+tripId+':flight:edit:'+m.flight.id;
      case 'newHotel': return 'draft:'+tripId+':hotel:new';
      case 'editHotel': return 'draft:'+tripId+':hotel:edit:'+m.hotel.id;
      case 'newDocument': return 'draft:document:new';
      case 'categoryBudgets': return 'draft:'+tripId+':catbudget';
      default: return null;
    }
  }
  let draftSaveTimer = null;
  function scheduleDraftSave(){
    clearTimeout(draftSaveTimer);
    draftSaveTimer = setTimeout(saveDraftNow, 500);
  }
  function collectModalFieldData(modalEl){
    const data = {};
    modalEl.querySelectorAll('[id]').forEach(el=>{
      if(el.tagName === 'BUTTON' || el.type === 'file') return;
      data[el.id] = (el.type === 'checkbox') ? el.checked : el.value;
    });
    return data;
  }
  async function saveDraftNow(){
    const key = modalDraftKey(state.modal);
    const modalEl = document.querySelector('#tl-modal-overlay .modal');
    if(!key || !modalEl) return;
    await safeSet(key, collectModalFieldData(modalEl));
  }
  async function clearDraft(m){
    const key = modalDraftKey(m);
    if(key) await safeDelete(key);
  }
  async function applyDraft(m){
    if(!m || m._draftApplied) return;
    m._draftApplied = true;
    if(m.prefill && m.prefill.fromScan) return; // don't clobber OCR-scanned data
    const key = modalDraftKey(m);
    if(!key) return;
    const data = await safeGet(key);
    if(!data) return;
    const modalEl = document.querySelector('#tl-modal-overlay .modal');
    if(!modalEl || state.modal !== m) return;
    let hasValue = false;
    Object.keys(data).forEach(id=>{
      const el = modalEl.querySelector('#'+CSS.escape(id));
      if(!el) return;
      if(el.type === 'checkbox'){ el.checked = !!data[id]; }
      else{ el.value = data[id]; if(data[id]) hasValue = true; }
    });
    ['m-pay','m-bank','m-taxrefund','m-doc-cat','m-rsv-type','m-rsv-booked'].forEach(id=>{
      const el = modalEl.querySelector('#'+id);
      if(el) el.dispatchEvent(new Event('change'));
    });
    if(hasValue){
      const h3 = modalEl.querySelector('h3');
      const note = document.createElement('div');
      note.className = 'modal-note';
      note.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--paper-2);padding:8px 10px;border-radius:8px;margin:0 0 14px;';
      note.innerHTML = `<span>已還原上次未完成的輸入內容</span><button type="button" class="icon-btn sm" style="font-size:11.5px;padding:3px 8px;" onclick="TL.discardDraft()">清除草稿</button>`;
      if(h3 && h3.nextSibling) h3.parentNode.insertBefore(note, h3.nextSibling);
      else if(h3) h3.after(note);
    }
  }

    async scanReceipt(inputEl){
      const file = inputEl.files && inputEl.files[0];
      if(!file) return;
      inputEl.value = '';
      const trip = currentTrip();
      state.scanning = true; state.scanError = null;
      state.modal = {type:'newExpense', prefill:{}};
      render();
      try{
        const base64 = await new Promise((res, rej)=>{
          const r = new FileReader();
          r.onload = () => res(r.result.split(',')[1]);
          r.onerror = () => rej(new Error('讀取圖片失敗'));
          r.readAsDataURL(file);
        });
        const mediaType = file.type || 'image/jpeg';
        const prompt = `請閱讀這張發票或收據圖片，並「只」回傳一個 JSON 物件，不要有其他文字或 Markdown 符號，格式如下：
{"desc": "商店或品項名稱", "date": "YYYY-MM-DD（若無法辨識請用今天日期 ${new Date().toISOString().slice(0,10)}）", "amount": 數字（總金額，不含幣別符號）, "currency": "三碼幣別代碼，若無法判斷請用 ${trip.localCurrency}", "category": "從這幾個類別選一個最符合的：餐飲、交通、住宿、購物、門票、其他"}`;

        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 1000,
            messages: [{ role: "user", content: [
              { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
              { type: "text", text: prompt }
            ]}]
          })
        });
        const data = await response.json();
        const textBlock = (data.content || []).map(b=>b.text||'').join('');
        const clean = textBlock.replace(/```json|```/g,'').trim();
        const parsed = JSON.parse(clean);

        state.scanning = false;
        state.modal = { type:'newExpense', prefill:{
          desc: parsed.desc || '', date: parsed.date || new Date().toISOString().slice(0,10),
          amount: parsed.amount || '', currency: parsed.currency || trip.localCurrency,
          category: EXPENSE_CATS.some(c=>c.key===parsed.category) ? parsed.category : '其他',
          fromScan: true
        }};
        render();
      }catch(err){
        console.error(err);
        state.scanning = false;
        state.scanError = '發票辨識失敗，請手動輸入花費內容。';
        state.modal = {type:'newExpense', prefill:{}};
        render();
      }
    },

      const cb = {};
      EXPENSE_CATS.forEach(c=>{
        const el = document.getElementById('m-budget-'+c.key);
        const v = el ? el.value : '';
        if(v !== '' && !isNaN(parseFloat(v))) cb[c.key] = parseFloat(v);
